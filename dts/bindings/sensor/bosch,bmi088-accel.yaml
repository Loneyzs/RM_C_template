description: |
    Bosch BMI088 6-axis IMU - accelerometer half.

    The BMI088 exposes the accelerometer and gyroscope as two independent SPI
    slave devices, each with its own chip select line and optional data-ready
    interrupt line. This binding describes the accelerometer half.

    Example (RoboMaster C-Type board):

        &spi1 {
            bmi088_accel: bmi088-accel@0 {
                compatible = "bosch,bmi088-accel";
                reg = <0>;
                spi-max-frequency = <10000000>;
                int-gpios = <&gpioc 4 GPIO_ACTIVE_HIGH>;
            };
        };

compatible: "bosch,bmi088-accel"

include: [spi-device.yaml, sensor-device.yaml]

properties:
  int-gpios:
    type: phandle-array
    description: |
        INT1 interrupt pin from the accelerometer. Active level and edge are
        configured by the driver at runtime; pass GPIO_ACTIVE_HIGH here and
        let the driver program BMI088 INT1 as push-pull / active-high if
        required.

  reset-gpios:
    type: phandle-array
    description: |
        Optional hardware reset pin for the accelerometer. BMI088 does not
        expose a shared reset line on the RoboMaster C-Type board, so this
        property is normally omitted; it is kept available for future
        hardware variants that tie the reset line to a GPIO.
