description: |
    Bosch BMI088 6-axis IMU - gyroscope half.

    The BMI088 exposes the accelerometer and gyroscope as two independent SPI
    slave devices, each with its own chip select line and optional data-ready
    interrupt line. This binding describes the gyroscope half.

    Example (RoboMaster C-Type board):

        &spi1 {
            bmi088_gyro: bmi088-gyro@1 {
                compatible = "bosch,bmi088-gyro";
                reg = <1>;
                spi-max-frequency = <10000000>;
                int-gpios = <&gpioc 5 GPIO_ACTIVE_HIGH>;
            };
        };

compatible: "bosch,bmi088-gyro"

include: [spi-device.yaml, sensor-device.yaml]

properties:
  int-gpios:
    type: phandle-array
    description: |
        INT3 interrupt pin from the gyroscope. Active level and edge are
        configured by the driver at runtime.

  reset-gpios:
    type: phandle-array
    description: |
        Optional hardware reset pin for the gyroscope. BMI088 does not expose
        a shared reset line on the RoboMaster C-Type board, so this property
        is normally omitted.
